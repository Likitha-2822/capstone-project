name: CI-CD Pipeline (Docker → ECR)

on:
push:
branches:
- main

env:
AWS_REGION: ap-south-1
AWS_ACCOUNT_ID: "765140436414"
BACKEND_REPO: backend-service
FRONTEND_REPO: frontend-service

jobs:
build-and-push:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v2
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Login to ECR
    run: |
      aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

  - name: Build & Push Backend
    run: |
      IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:latest
      docker build -t $IMAGE_URI backend/
      docker push $IMAGE_URI

  - name: Build & Push Frontend
    run: |
      IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:latest
      docker build -t $IMAGE_URI frontend/
      docker push $IMAGE_URI
      
- name: Verify Rollout
        run: |
          kubectl rollout status deployment/backend
          kubectl rollout status deployment/frontend
